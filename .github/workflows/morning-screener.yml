name: Morning Stock Screener

on:
  workflow_dispatch:
  schedule:
    - cron: "0 23 * * *"

jobs:
  run-screener:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pandas yfinance

      - name: Run screener
        run: |
          python screener.py

      - name: Upload result CSV files
        uses: actions/upload-artifact@v4
        with:
          name: screener-results
          path: |
            large_caps.csv
            mid_caps.csv
            low_price.csv
            morning_watchlist.csv
